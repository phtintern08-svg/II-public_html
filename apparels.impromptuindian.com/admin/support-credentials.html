<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Credentials Management – ImpromptuIndian Admin</title>
    <meta name="description" content="Manage support user credentials and access" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/admin-global.css" />
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
</head>

<body class="bg-gray-900 text-white">
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>
        <script src="js/sidebar.js"></script>

        <main class="flex-1 overflow-y-auto p-4 pt-20 md:p-8 md:pt-8">
            <!-- Page Header -->
            <div class="reveal mb-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                <div class="w-full md:w-auto">
                    <h1 class="text-2xl md:text-3xl font-bold mb-2 flex items-center gap-2 sm:gap-3">
                        <i data-lucide="key-round" class="w-6 h-6 md:w-7 md:h-7 text-[#FFCC00]"></i>
                        Support Credentials
                    </h1>
                    <p class="text-gray-400 text-sm md:text-base">Create and manage support user login credentials</p>
                </div>
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                    <a href="support.html"
                        class="flex items-center justify-center gap-2 px-4 py-2.5 bg-gray-800/50 text-gray-300 rounded-xl transition-all border border-white/10 hover:border-blue-500/50 hover:bg-gray-800 hover:text-white w-full md:w-auto">
                        <i data-lucide="arrow-left" class="w-4 h-4 text-blue-400"></i>
                        <span class="text-sm font-semibold tracking-wide uppercase">Back to Support</span>
                    </a>
                    <button class="btn-refresh w-full md:w-auto" onclick="loadSupportUsers()">
                        <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                        <span>Sync Data</span>
                    </button>
                </div>
            </div>

            <!-- Summary Statistics Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6 mb-6 md:mb-8 reveal" style="transition-delay: 100ms;">
                <div class="summary-card summary-card-primary">
                    <div class="summary-icon summary-icon-primary">
                        <i data-lucide="users" class="w-5 h-5 md:w-6 md:h-6"></i>
                    </div>
                    <div class="summary-content">
                        <p class="summary-label">Total Users</p>
                        <p class="summary-value" id="total-users">
                            <span class="summary-number">0</span>
                        </p>
                    </div>
                    <div class="summary-glow"></div>
                </div>

                <div class="summary-card summary-card-success">
                    <div class="summary-icon summary-icon-success">
                        <i data-lucide="user-check" class="w-5 h-5 md:w-6 md:h-6"></i>
                    </div>
                    <div class="summary-content">
                        <p class="summary-label">Active Users</p>
                        <p class="summary-value" id="active-users">
                            <span class="summary-number">0</span>
                        </p>
                    </div>
                    <div class="summary-glow"></div>
                </div>

                <div class="summary-card summary-card-danger">
                    <div class="summary-icon summary-icon-danger">
                        <i data-lucide="user-x" class="w-5 h-5 md:w-6 md:h-6"></i>
                    </div>
                    <div class="summary-content">
                        <p class="summary-label">Inactive Users</p>
                        <p class="summary-value" id="inactive-users">
                            <span class="summary-number">0</span>
                        </p>
                    </div>
                    <div class="summary-glow"></div>
                </div>

                <div class="summary-card summary-card-info">
                    <div class="summary-icon summary-icon-info">
                        <i data-lucide="shield" class="w-5 h-5 md:w-6 md:h-6"></i>
                    </div>
                    <div class="summary-content">
                        <p class="summary-label">Managers</p>
                        <p class="summary-value" id="managers-count">
                            <span class="summary-number">0</span>
                        </p>
                    </div>
                    <div class="summary-glow"></div>
                </div>
            </div>

            <!-- CREATE SUPPORT USER -->
            <div class="card mb-6 reveal" style="transition-delay: 200ms;">
                <div class="card-header">
                    <h3 class="card-title flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-5 h-5"></i>
                        Create Support Login
                    </h3>
                </div>
                <div class="card-body">
                    <form id="createSupportForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-300">Full Name</label>
                            <input type="text" id="name" placeholder="Enter full name" 
                                class="w-full bg-gray-800/50 border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-300">Email</label>
                            <input type="email" id="email" placeholder="Enter email address" 
                                class="w-full bg-gray-800/50 border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-300">Phone Number</label>
                            <input type="tel" id="phone" placeholder="Enter phone number" 
                                class="w-full bg-gray-800/50 border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-300">Password</label>
                            <input type="password" id="password" placeholder="Enter password" 
                                class="w-full bg-gray-800/50 border border-white/10 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-gray-300">Role</label>
                            <select id="role" class="w-full bg-gray-800/50 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all">
                                <option value="support">Support Executive</option>
                                <option value="senior_support">Senior Support</option>
                                <option value="manager">Support Manager</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <button type="submit" class="btn-primary w-full md:w-auto">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                                <span>Create Credentials</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- SUPPORT USERS TABLE -->
            <div class="card reveal" style="transition-delay: 300ms;">
                <div class="card-header">
                    <div class="flex items-center justify-between">
                        <h3 class="card-title flex items-center gap-2">
                            <i data-lucide="table" class="w-5 h-5"></i>
                            Existing Support Users
                        </h3>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-400" id="users-count-display">0 users</span>
                            <div class="loading-spinner hidden" id="table-loading">
                                <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>
                                        <i data-lucide="user" class="w-3.5 h-3.5 inline-block"></i>
                                        Name
                                    </th>
                                    <th>
                                        <i data-lucide="mail" class="w-3.5 h-3.5 inline-block"></i>
                                        Email
                                    </th>
                                    <th>
                                        <i data-lucide="phone" class="w-3.5 h-3.5 inline-block"></i>
                                        Phone
                                    </th>
                                    <th>
                                        <i data-lucide="shield" class="w-3.5 h-3.5 inline-block"></i>
                                        Role
                                    </th>
                                    <th>
                                        <i data-lucide="circle" class="w-3.5 h-3.5 inline-block"></i>
                                        Status
                                    </th>
                                    <th class="text-right">
                                        <i data-lucide="settings" class="w-3.5 h-3.5 inline-block"></i>
                                        Actions
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="supportUsersTable">
                                <tr>
                                    <td colspan="6" class="text-center py-12">
                                        <div class="flex flex-col items-center gap-3">
                                            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-blue-400"></i>
                                            <p class="text-gray-400">Loading support users...</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden">
        <i data-lucide="check-circle" class="w-5 h-5 text-green-500"></i>
        <span id="toast-msg">Action completed!</span>
    </div>

    <script src="js/support-credentials.js"></script>
</body>

</html>
